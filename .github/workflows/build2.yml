name: Software Build Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js bereitstellen
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Abhängigkeiten installieren und Frontend bauen
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Frontend Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
